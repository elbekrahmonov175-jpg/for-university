{% extends "base.html" %}
{% block title %}Вход - ТИТЛП{% endblock %}
{% block content %}
<div class="container" style="max-width:400px;margin:3rem auto;">
<div class="card">
<h2>Вход</h2>
<form method="POST" action="{{ url_for("login") }}">
<div class="form-group"><label>Имя</label><input type="text" name="username" class="form-control" required></div>
<div class="form-group"><label>Пароль</label><input type="password" name="password" class="form-control" required></div>
<button type="submit" class="btn btn-primary" style="width:100%;">Войти</button>
</form>
<p style="text-align:center;margin-top:1rem;"><a href="{{ url_for("register") }}">Регистрация</a></p>
</div>
</div>
{% endblock %}
